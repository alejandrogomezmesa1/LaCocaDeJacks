<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>La Coca - Control de Cupos</title>
    <link rel="stylesheet" href="css/cupos.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- NAVBAR -->
    <nav class="navbar">
      <div class="navbar-brand">
        <div class="navbar-logo">
          <img src="assets/LaCocaLogo.png" alt="La Coca" />
        </div>
        <span class="navbar-title">La Coca</span>
      </div>
      <div class="navbar-nav">
        <a href="admin.html" class="nav-link">Inicio</a>
        <a href="cupos.html" class="nav-link active">Cupos</a>
        <a href="comprobantes.html" class="nav-link">Comprobantes</a>
      </div>
      <div class="navbar-user">Admin</div>
    </nav>

    <div class="container">
      <div class="page-header">
        <h1 class="page-title">Control de Disponibilidad</h1>
        <p class="page-subtitle">
          Monitoreo de cupos registrados y capacidad por ruta.
        </p>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Total cupos</div>
          <div id="totalCupos" class="stat-value">100</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Cupos reservados</div>
          <div id="reservedCupos" class="stat-value">65</div>
          <div class="progress-wrapper">
            <div
              id="cuposProgress"
              class="progress-bar"
              style="width: 65%"
            ></div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Disponibles</div>
          <div id="availableCupos" class="stat-value">35</div>
        </div>
      </div>

      <div class="filter-panel">
        <div class="filter-item">
          <label>Fecha de Entrega</label>
          <input type="date" value="2026-04-29" />
        </div>
        <div class="filter-item">
          <label>Sector / Ruta</label>
          <select>
            <option>Todos los sectores</option>
            <option>El Poblado</option>
            <option>Envigado</option>
            <option>Laureles</option>
          </select>
        </div>
        <div class="filter-item search-item">
          <label>Buscar Usuario</label>
          <input type="text" placeholder="Nombre o ID..." />
        </div>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Usuario</th>
              <th>Sector</th>
              <th>Plan</th>
              <th>Estado Cupo</th>
              <th>Fecha Registro</th>
              <th>Acción</th>
            </tr>
          </thead>
          <tbody>
            <!-- Filas dinámicas cargadas por js/admin.js -->
          </tbody>
        </table>
      </div>
    </div>
    <script src="js/admin.js"></script>
  </body>
</html>
